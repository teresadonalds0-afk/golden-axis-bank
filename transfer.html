<!DOCTYPE html>
<html>
<head>
<title>Transfer Money - Golden Axis Bank</title>

<style>
body{
background:#000;
color:white;
font-family:Arial;
padding:20px;
}

.container{
background:#111;
padding:20px;
border-radius:10px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
background:gold;
color:black;
padding:12px;
border:none;
border-radius:6px;
margin-top:15px;
width:100%;
font-weight:bold;
}
</style>

</head>

<body>

<h2>Transfer Money</h2>

<div class="container">

<label>Account Number</label>
<input type="text">

<label>Amount</label>
<input type="number">

<button onclick="sendMoney()">Transfer Money</button>
<br><br>

<a href="dashboard.html">
<button>Back to Dashboard</button>
</a>

</div>
<script>

function sendMoney(){

let amount = document.querySelector('input[type="number"]').value;

let balance = localStorage.getItem("balance") || 12450;

balance = balance - amount;

localStorage.setItem("balance", balance);

alert("Transfer Successful");

window.location.href="dashboard.html";

}

</script>
</body>
</html>
