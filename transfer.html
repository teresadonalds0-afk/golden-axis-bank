<!DOCTYPE html>
<html>
<head>
<title>Transfer Money - Golden Axis Bank</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
margin:0;
}

header{
background:gold;
color:black;
padding:20px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.container{
padding:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
background:gold;
color:black;
border:none;
padding:12px;
width:100%;
font-size:16px;
border-radius:6px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<header>
Golden Axis Bank
</header>

<div class="container">

<div class="card">

<h2>Transfer Money</h2>

<input type="text" placeholder="Recipient Name">

<input type="text" placeholder="Account Number">

<input type="number" placeholder="Amount">

<input type="text" placeholder="Reference">

<button onclick="sendMoney()">
Send Money
</button>
</div>

</div>
<script>

let balance = 12450;

function sendMoney(){

let amount = document.querySelector('input[placeholder="Amount"]').value;

amount = Number(amount);

if(amount <= 0){
alert("Enter valid amount");
return;
}

if(amount > balance){
alert("Insufficient funds");
return;
}

balance = balance - amount;

alert("Transfer Successful!");

localStorage.setItem("balance", balance);

}

</script>
</body>
</html>
