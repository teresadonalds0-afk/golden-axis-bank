<!DOCTYPE html>
<html>
<head>
<title>Golden Axis Bank Dashboard</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
margin:0;
}

header{
background:gold;
color:black;
padding:20px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.balance{
font-size:30px;
color:gold;
}

button{
background:gold;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
}

</style>

</head>

<body>

<header>
Golden Axis Bank
</header>

<div class="container">

<div class="card">
<h3>Account Balance</h3>
<div class="balance" id="balance">$12,450.00</div>
</div>

<div class="card">
<h3>Quick Actions</h3>

<a href="transfer.html">
<button>Transfer Money</button>
</a>
<br><br>

<button>Transaction History</button>

</div>

<div class="card">
<h3>Recent Transactions</h3>

<p>Amazon Purchase - $120</p>
<p>Salary Deposit +$2,000</p>
<p>Netflix - $15</p>

</div>

</div>

<script>

let savedBalance = localStorage.getItem("balance");

if(savedBalance){
document.getElementById("balance").innerText = "$" + savedBalance;
}

</script>

</body>
</html>
