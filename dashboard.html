<!DOCTYPE html>
<html>
<head>
<title>Golden Axis Bank</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
margin:0;
}

header{
background:gold;
color:black;
padding:20px;
font-size:24px;
text-align:center;
font-weight:bold;
}

.card{
background:#111;
margin:20px;
padding:20px;
border-radius:10px;
}

button{
background:gold;
color:black;
border:none;
padding:10px 20px;
margin:10px 0;
border-radius:6px;
}

</style>
</head>

<body>

<header>Golden Axis Bank</header>

<div class="card">

<div style="background:linear-gradient(135deg,gold,#d4af37);color:black;padding:20px;border-radius:12px;">

<h3>Golden Axis Card</h3>

<p>**** **** **** 2450</p>

<h2>$12,450</h2>

</div>
</div>

<h1 id="balance">$12,450</h1>

<div class="card">
<h2>Quick Actions</h2>

<a href="transfer.html">
<button>Transfer Money</button>
</a>

</div>

<div class="card">
<h2>Recent Transactions</h2>

<div id="transactions"></div>

</div>

<script>

let history = JSON.parse(localStorage.getItem("history")) || [];

let container = document.getElementById("transactions");

history.reverse().forEach(function(item){

let p = document.createElement("p");

p.innerText = item;

container.appendChild(p);

});

function transfer(){

let account = prompt("Enter account number");

let amount = prompt("Enter amount");

let balance = 12450;

balance = balance - amount;

history.push("Transfer to " + account + " - $" + amount);

localStorage.setItem("history", JSON.stringify(history));

alert("Transfer Successful!");

location.reload();

}

</script>

</body>
</html>
